<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website with Preloader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ========================================================
           ১. প্রি-লোডার (Splash Screen) এবং পানির ফোঁটা অ্যানিমেশন
           ======================================================== */
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: #3a3a3a; /* ছবির মতো ডার্ক গ্রে ব্যাকগ্রাউন্ড */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            overflow: hidden;
            transition: opacity 0.5s ease-out, visibility 0.5s;
        }

        /* মোশন গ্রাফিক্স ওয়াটার রিপল (পানির ফোঁটার বৃত্ত) */
        .ripple-container {
            position: relative;
            width: 250px;
            height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            /* লোগোর কালারের মতো সবুজ-নীল গ্রেডিয়েন্ট */
            background: radial-gradient(circle, rgba(29,112,184,0.8) 0%, rgba(0,150,64,0.6) 70%, rgba(58,58,58,0) 100%);
            animation: waterDrop 3s cubic-bezier(0.1, 0.8, 0.3, 1) infinite;
            opacity: 0;
        }

        /* পানির ফোঁটার একাধিক লেয়ার তৈরি করতে ডিলে (Delay) */
        .ripple:nth-child(2) {
            animation-delay: 1s;
        }
        .ripple:nth-child(3) {
            animation-delay: 2s;
        }

        /* মোশন গ্রাফিক্স অ্যানিমেশন ইফেক্ট */
        @keyframes waterDrop {
            0% {
                width: 0px;
                height: 0px;
                opacity: 0.8;
            }
            100% {
                width: 350px;
                height: 350px;
                opacity: 0;
            }
        }

        /* মাঝখানের মূল লোগো */
        .preloader-logo {
            position: relative;
            z-index: 10;
            width: 120px; /* লোগোর সাইজ */
            height: auto;
        }

        /* loading টেক্সট স্টাইল */
        .loading-text {
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 16px;
            margin-top: 30px;
            letter-spacing: 1px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s ease-in-out;
        }

        /* টেক্সটটি দেখানোর জন্য ক্লাস */
        .loading-text.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* ========================================================
           ২. মূল ওয়েবসাইট হেডার এবং টুলবার স্টাইল
           ======================================================== */
        .main-header {
            background: linear-gradient(to right, #009640, #1D70B8, #003366);
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0 30px;
        }

        .logo-container img {
            height: 50px;
            object-fit: contain;
        }

        .toolbar-container {
            background-color: #ffffff;
            padding: 12px 20px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toolbar-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-tool {
            background-color: #ffffff;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            padding: 6px 12px;
            color: #334155;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn-tool:hover {
            background-color: #f8fafc;
            border-color: #94a3b8;
        }

        .page-input {
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            width: 70px;
            text-align: center;
            padding: 4px;
            font-size: 14px;
            font-weight: 600;
        }
    </style>
</head>
<body style="margin:0; font-family: sans-serif; background-color: #f1f5f9;">

    <div id="preloader">
        <div class="ripple-container">
            <div class="ripple"></div>
            <div class="ripple"></div>
            <div class="ripple"></div>
            
            <img class="preloader-logo" src="asharqia chamber.png">
        </div>
        
        <div class="loading-text" id="loadingText">Please wait loading...</div>
    </div>
    <header class="main-header">
        <div class="logo-container">
            <img src="asharqia chamber.png">
        </div>
    </header>

    <div class="toolbar-container">
        <div class="toolbar-row">
            <button class="btn-tool"><i class="fa-solid fa-list"></i></button>
            <div style="display: flex; align-items: center; border: 1px solid #cbd5e1; border-radius: 6px; background: white;">
                <button class="btn-tool" style="border: none;"><i class="fa-solid fa-chevron-left"></i></button>
                <input type="text" class="page-input" value="1/0" style="border: none; border-left: 1px solid #cbd5e1; border-right: 1px solid #cbd5e1;">
                <button class="btn-tool" style="border: none;"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
            <button class="btn-tool"><i class="fa-solid fa-download"></i></button>
        </div>

        <div class="toolbar-row">
            <button class="btn-tool"><i class="fa-solid fa-magnifying-glass-minus"></i></button>
            <button class="btn-tool"><i class="fa-solid fa-magnifying-glass-plus"></i></button>
            <button class="btn-tool"><i class="fa-solid fa-arrows-left-right"></i></button>
            <span style="color: #cbd5e1; margin: 0 4px;">|</span>
            <button class="btn-tool"><i class="fa-solid fa-rotate-left"></i></button>
            <button class="btn-tool"><i class="fa-solid fa-arrow-rotate-left"></i></button>
            <button class="btn-tool"><i class="fa-solid fa-arrow-rotate-right"></i></button>
            <button class="btn-tool"><i class="fa-solid fa-rotate-right"></i></button>
            <span style="color: #cbd5e1; margin: 0 4px;">|</span>
            <button class="btn-tool"><i class="fa-solid fa-moon"></i></button>
        </div>
    </div>

    <div style="margin: 20px; padding: 100px 40px; background-color: #ffffff; border: 1px solid #e2e8f0; text-align: center; border-radius: 4px;">
    </div>


    <script>
        // ৬.৫ সেকেন্ড পর "Please wait loading" লেখাটি দেখাবে
        setTimeout(function() {
            document.getElementById('loadingText').classList.add('show');
        }, 6500); 

        // ঠিক ৮ সেকেন্ড (৮০০০ মিলিসেকেন্ড) পর প্রি-লোডারটি বন্ধ হয়ে হোমপেজ দেখাবে
        window.addEventListener('load', function() {
            setTimeout(function() {
                var preloader = document.getElementById('preloader');
                preloader.style.opacity = '0';
                preloader.style.visibility = 'hidden';
            }, 8000); 
        });
    </script>

</body>
</html>
<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automatic QR Code Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- QR Code Generator Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        /* ========================================================
           ১. প্রি-লোডার (Splash Screen) এবং পানির ফোঁটা অ্যানিমেশন
           ======================================================== */
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: #3a3a3a; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            overflow: hidden;
            transition: opacity 0.5s ease-out, visibility 0.5s;
        }

        .ripple-container {
            position: relative;
            width: 200px;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(29,112,184,0.8) 0%, rgba(0,150,64,0.4) 70%, rgba(58,58,58,0) 100%);
            animation: waterDrop 3s cubic-bezier(0.1, 0.8, 0.3, 1) infinite;
            opacity: 0;
            pointer-events: none;
        }

        .ripple:nth-child(2) { animation-delay: 1s; }
        .ripple:nth-child(3) { animation-delay: 2s; }

        @keyframes waterDrop {
            0% { width: 0px; height: 0px; opacity: 0.8; }
            100% { width: 400px; height: 400px; opacity: 0; }
        }

        .preloader-logo {
            position: relative;
            z-index: 10;
            width: 120px; 
            height: auto;
        }

        .loading-text {
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 16px;
            margin-top: 40px;
            letter-spacing: 1px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s ease-in-out;
        }

        .loading-text.show { opacity: 1; transform: translateY(0); }

        /* ========================================================
           ২. মূল ওয়েবসাইট হেডার এবং টুলবার স্টাইল
           ======================================================== */
        .main-header {
            background: linear-gradient(to right, #009640, #1D70B8, #003366);
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
        }

        .logo-container img { height: 50px; object-fit: contain; }

        /* ========================================================
           ৩. কিউআর কোড জেনারেটর প্যানেল স্টাইল
           ======================================================== */
        .qr-main-container {
            max-width: 600px;
            margin: 40px auto;
            padding: 30px;
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            font-family: Arial, sans-serif;
        }

        .qr-main-container h2 {
            text-align: center;
            color: #1e293b;
            margin-bottom: 25px;
            font-size: 22px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #475569;
            font-weight: 600;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            border-color: #1D70B8;
        }

        .btn-generate {
            width: 100%;
            background-color: #009640;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-generate:hover { background-color: #007a33; }

        /* QR কোড ডিসপ্লে এরিয়া */
        .qr-output-box {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            border: 2px dashed #e2e8f0;
            border-radius: 8px;
            background-color: #f8fafc;
        }

        #qrcode canvas, #qrcode img {
            padding: 10px;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 4px;
        }

        .live-preview-link {
            margin-top: 15px;
            font-size: 13px;
            color: #64748b;
            text-align: center;
            word-break: break-all;
            max-width: 90%;
        }

        .btn-download {
            margin-top: 20px;
            background-color: #1D70B8;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: none; /* প্রথমে লোকানো থাকবে, কোড তৈরি হলে শো করবে */
            align-items: center;
            gap: 8px;
            text-decoration: none;
            transition: background 0.2s;
        }

        .btn-download:hover { background-color: #15558d; }
    </style>
</head>
<body style="margin:0; background-color: #f1f5f9;">

    <!-- প্রি-লোডার -->
    <div id="preloader">
        <div class="ripple-container">
            <div class="ripple"></div>
            <div class="ripple"></div>
            <img class="preloader-logo" src="https://via.placeholder.com/120x120/ffffff/000000?text=LOGO" alt="Logo">
        </div>
        <div class="loading-text" id="loadingText">অনুগ্রহ করে অপেক্ষা করুন, লোড হচ্ছে...</div>
    </div>

    <!-- মেইন হেডার -->
    <header class="main-header">
        <div class="logo-container">
            <img src="https://via.placeholder.com/150x50/ffffff/000000?text=LOGO" alt="Logo">
        </div>
    </header>

    <!-- 🔽 QR কোড জেনারেটর ফর্ম এরিয়া 🔽 -->
    <div class="qr-main-container">
        <h2><i class="fa-solid fa-qrcode" style="color: #1D70B8; margin-right: 8px;"></i> অটোমেটিক QR কোড জেনারেটর</h2>
        
        <!-- ইনপুট ১: ওয়েবসাইট লিংক -->
        <div class="input-group">
            <label for="webUrl">আপনার ওয়েবসাইট লিংক (যেমন: https://example.com/ )</label>
            <input type="text" id="webUrl" value="https://example.com/" placeholder="https://yourwebsite.com/">
        </div>

        <!-- ইনপুট ২: ফাইলের নাম -->
        <div class="input-group">
            <label for="fileName">ফাইলের নাম বা ডিরেক্টরি (যেমন: document.pdf বা file.jpg)</label>
            <input type="text" id="fileName" value="sample_document.pdf" placeholder="myfile.pdf">
        </div>

        <button class="btn-generate" onclick="generateCombinedQRCode()"><i class="fa-solid fa-gear"></i> QR কোড তৈরি করুন</button>

        <!-- ফলাফল এরিয়া -->
        <div class="qr-output-box">
            <div id="qrcode"></div>
            <div class="live-preview-link" id="previewLink">লিংক প্রিভিউ এখানে দেখাবে</div>
            
            <!-- JPG ডাউনলোড বাটন -->
            <button id="downloadBtn" class="btn-download" onclick="downloadQRAsJPG()">
                <i class="fa-solid fa-file-arrow-down"></i> JPG ফাইল ডাউনলোড করুন
            </button>
        </div>
    </div>

    <script>
        // বিশ্বস্ত QR কোড জেনারেটর ভেরিয়েবল
        var qrcodeInstance = null;

        // দুটি লিংক একসাথে করে কিউআর কোড বানানোর ফাংশন
        function generateCombinedQRCode() {
            var baseUrl = document.getElementById('webUrl').value.trim();
            var fileName = document.getElementById('fileName').value.trim();

            // স্ল্যাশ (/) হ্যান্ডেল করার জন্য লজিক
            if (baseUrl !== "" && !baseUrl.endsWith('/')) {
                baseUrl += '/';
            }

            // চূড়ান্ত কম্বাইনড ইউআরএল তৈরি
            var finalUrl = baseUrl + fileName;

            // যদি ইনপুট খালি থাকে
            if(baseUrl === "" || fileName === "") {
                alert("দয়া করে ওয়েবসাইট লিংক এবং ফাইলের নাম দুটোই সঠিকভাবে লিখুন।");
                return;
            }

            // আগের তৈরি করা কিউআর কোড মুছে নতুনটি বসানো
            var qrContainer = document.getElementById("qrcode");
            qrContainer.innerHTML = ""; 

            // নতুন QR কোড তৈরি করা হচ্ছে (আকার: 200x200)
            qrcodeInstance = new QRCode(qrContainer, {
                text: finalUrl,
                width: 200,
                height: 200,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });

            // নিচে লিংকের প্রিভিউ টেক্সট দেখানো
            document.getElementById('previewLink').innerHTML = "<strong>জেনারেট হওয়া লিংক:</strong> <a href='"+finalUrl+"' target='_blank'>"+finalUrl+"</a>";

            // ডাউনলোড বাটনটি দৃশ্যমান (Show) করা
            document.getElementById('downloadBtn').style.display = "inline-flex";
        }

        // QR কোডটিকে JPG ফরমেটে ডাউনলোড করার ফাংশন
        function downloadQRAsJPG() {
            // QRCode লাইব্রেরি ভেতরের ক্যানভাস এলিমেন্টকে টার্গেট করে
            var qrCanvas = document.querySelector('#qrcode canvas');
            
            if (qrCanvas) {
                // ক্যানভাস থেকে ইমেজ ডেটা (Data URL) নেওয়া হচ্ছে
                var imageURL = qrCanvas.toDataURL("image/jpeg");
                
                // ডাউনলোডের জন্য একটি ভার্চুয়াল ক্লিক লিংক তৈরি করা
                var downloadLink = document.createElement('a');
                downloadLink.href = imageURL;
                downloadLink.download = 'qrcode_file.jpg'; // ডাউনলোড ফাইলের নাম
                
                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);
            } else {
                alert("প্রথমে 'QR কোড তৈরি করুন' বাটনে ক্লিক করুন!");
            }
        }

        // পেজ লোড হওয়ার সাথে সাথে প্রথমবার একটি ডিফল্ট কোড রান করা হবে
        window.addEventListener('load', function() {
            generateCombinedQRCode();
        });

        /* ========================================================
           ৪. প্রি-লোডার কন্ট্রোল লজিক
           ======================================================== */
        var textTimeout = setTimeout(function() {
            document.getElementById('loadingText').classList.add('show');
        }, 1500); 

        window.addEventListener('load', function() {
            clearTimeout(textTimeout);
            var preloader = document.getElementById('preloader');
            preloader.style.opacity = '0';
            preloader.style.visibility = 'hidden';
        });
    </script>

</body>
</html>
